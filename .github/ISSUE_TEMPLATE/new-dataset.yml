name: New dataset
description: Suggest a dataset for inclusion
labels: [new-entry]
body:
  - type: input
    id: title
    attributes:
      label: Paper title
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Authors
      description: Last, First; Last, First
    validations:
      required: true

  - type: input
    id: doi
    attributes:
      label: DOI
    validations:
      required: true

  - type: input
    id: journal
    attributes:
      label: Journal
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Publication year
    validations:
      required: true

  - type: input
    id: replication_url
    attributes:
      label: Data link
      description: Direct link to dataset or replication archive.
    validations:
      required: true

  - type: input
    id: regions
    attributes:
      label: Geographic coverage
      description: Subregion(s), comma-separated (e.g. Western Europe, South-eastern Asia).
    validations:
      required: true

  - type: input
    id: countries
    attributes:
      label: Countries
      description: Comma-separated. Leave blank if global/comparative.

  - type: input
    id: period_start
    attributes:
      label: Period start (year)

  - type: input
    id: period_end
    attributes:
      label: Period end (year)

  - type: textarea
    id: notes
    attributes:
      label: Notes
