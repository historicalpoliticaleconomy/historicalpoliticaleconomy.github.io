<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Dataset — HPE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Historical Political Economy Datasets</h1>
    <a class="btn-add" href="index.html">← Back</a>
  </header>
  <main class="submit-main">
    <h2>Add your dataset</h2>
    <p>Submit a replication dataset for inclusion in the HPE database.</p>
    <form class="submit-form" id="submit-form">
      <label for="doi">Article DOI</label>
      <input type="text" id="doi" placeholder="10.xxxx/xxxxx" required>
      <label for="data-url">Replication data URL</label>
      <input type="text" id="data-url" placeholder="https://..." required>
      <button type="submit">Submit</button>
    </form>
  </main>
  <script>
    document.getElementById('submit-form').addEventListener('submit', e => {
      e.preventDefault();
      const doi     = document.getElementById('doi').value.trim();
      const dataUrl = document.getElementById('data-url').value.trim();
      const body = JSON.stringify({ doi, data_url: dataUrl }, null, 2);
      const a    = document.createElement('a');
      a.href =
        `mailto:hmm2198@columbia.edu` +
        `?subject=${encodeURIComponent('HPE Dataset Submission')}` +
        `&body=${encodeURIComponent(body)}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  </script>
</body>
</html>
