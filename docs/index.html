<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPE Dataset Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Historical Political Economy Datasets</h1>
  </header>

  <div class="layout">
    <aside class="filters">
      <h2>Filter</h2>

      <section>
        <h3>Historical Period</h3>
        <div class="range-inputs">
          <label>From <input type="number" id="period-from" placeholder="e.g. 1500"></label>
          <label>To <input type="number" id="period-to" placeholder="e.g. 1950"></label>
        </div>
      </section>

      <section>
        <h3>Region</h3>
        <div id="region-filters" class="checkbox-group"></div>
      </section>

      <button id="clear-filters">Clear filters</button>
    </aside>

    <main>
      <p class="results-count" id="results-count"></p>
      <ul id="results" class="results-list"></ul>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
