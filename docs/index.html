<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPE Dataset Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Historical Political Economy Datasets</h1>
    <a class="btn-add" href="about.html">About</a>
    <a class="btn-add" href="https://github.com/historicalpoliticaleconomy/historicalpoliticaleconomy.github.io/issues/new?template=new-dataset.yml" target="_blank" rel="noopener">Add your dataset</a>
  </header>
  <main>
    <div class="search-panel">
      <div class="search-row">
        <input type="search" id="search-input"
               placeholder="Search title, author, or tag…" autocomplete="off">
      </div>
      <div id="heatmap"></div>
    </div>
    <p class="results-count" id="results-count"></p>
    <ul id="results" class="results-list"></ul>
  </main>
  <script src="app.js"></script>
</body>
</html>
